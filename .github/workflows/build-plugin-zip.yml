name: Build plugin zip

on:
  push:
    branches:
      - main
      - '**'
  pull_request:
  workflow_dispatch:

jobs:
  build-zip:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build plugin zip
        id: build
        run: |
          set -euo pipefail

          BASE_VERSION="$(sed -n 's/^ \* Version: //p' zeffy-sync.php | head -n1)"
          BUILD_VERSION="${BASE_VERSION}.${GITHUB_RUN_NUMBER}"

          rm -rf dist
          mkdir -p dist/zeffy-sync

          cp zeffy-sync.php dist/zeffy-sync/
          cp README.md dist/zeffy-sync/

          if [ -d docs ]; then
            cp -R docs dist/zeffy-sync/
          fi

          sed -i "s/^ \\* Version: .*/ * Version: ${BUILD_VERSION}/" dist/zeffy-sync/zeffy-sync.php
          echo "${BUILD_VERSION}" > dist/build-version.txt

          (cd dist && zip -r zeffy-sync.zip zeffy-sync)

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: zeffy-sync-plugin
          path: |
            dist/zeffy-sync.zip
            dist/build-version.txt
          if-no-files-found: error

  publish-release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: build-zip
    permissions:
      contents: write

    steps:
      - name: Download plugin artifact
        uses: actions/download-artifact@v4
        with:
          name: zeffy-sync-plugin
          path: dist

      - name: Read build version
        id: version
        run: |
          set -euo pipefail
          BUILD_VERSION="$(cat dist/build-version.txt)"
          echo "build_version=${BUILD_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.build_version }}
          name: Zeffy Sync v${{ steps.version.outputs.build_version }}
          files: dist/zeffy-sync.zip
          generate_release_notes: true
